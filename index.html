<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آٹا چکی پرو کیلکولیٹر</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic+Urdu:wght@400..700&display=swap');
        body {
            font-family: 'Noto Naskh Arabic Urdu', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        .input-style {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-style:focus {
            border-color: #2563eb;
        }
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-blue-700">آٹا چکی پرو</h1>
            <p class="text-gray-500 mt-2">محفوظ کھاتہ اور پسائی کیلکولیٹر</p>
        </header>

        <!-- Install Banner (Hidden by default) -->
        <div id="install-banner" class="hidden bg-blue-600 text-white p-4 rounded-lg mb-6 flex justify-between items-center shadow-lg">
            <span>بہتر استعمال کے لیے ایپ انسٹال کریں۔</span>
            <button id="install-btn" class="bg-white text-blue-600 px-4 py-1 rounded-full font-bold">انسٹال</button>
        </div>

        <!-- Main Calculator Form -->
        <section class="card p-6 mb-8">
            <form id="calc-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1 font-bold">کسٹمر کا نام</label>
                        <input type="text" id="cust-name" class="input-style" placeholder="نام درج کریں" required>
                    </div>
                    <div>
                        <label class="block mb-1 font-bold">کل وزن (کلوگرام)</label>
                        <input type="number" step="0.01" id="weight" class="input-style" placeholder="0.00" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1 font-bold">آٹے کا ریٹ (فی کلو)</label>
                        <input type="number" step="0.01" id="rate" class="input-style" placeholder="روپے">
                    </div>
                    <div>
                        <label class="block mb-1 font-bold">ایڈوانس آٹا (کلو)</label>
                        <input type="number" step="0.01" id="advance" class="input-style" value="0">
                    </div>
                </div>

                <!-- Checkboxes -->
                <div class="bg-gray-50 p-4 rounded-lg space-y-3">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="no-safai" class="w-5 h-5 accent-blue-600">
                        <span>صفائی نہیں کرنی (ریٹ 3.00 روپے)</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="no-katoti" class="w-5 h-5 accent-blue-600">
                        <span>کٹوتی نہیں کرنی</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="bill-flour" class="w-5 h-5 accent-blue-600">
                        <span>بل آٹا سے ادا ہوگا</span>
                    </label>
                </div>

                <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white py-3 rounded-lg text-xl font-bold shadow-md transition">حساب کریں</button>
            </form>
        </section>

        <!-- Receipt Display -->
        <section id="receipt-box" class="hidden card p-6 mb-8 border-2 border-dashed border-blue-200 bg-blue-50">
            <h2 class="text-2xl font-bold text-center mb-4 border-b pb-2">عارضی رسید</h2>
            <div id="receipt-content" class="space-y-2 text-lg"></div>
            <div class="grid grid-cols-2 gap-4 mt-6">
                <button id="save-khata" class="bg-orange-600 text-white py-2 rounded-lg font-bold">کھاتہ میں محفوظ</button>
                <button id="clear-receipt" class="bg-gray-400 text-white py-2 rounded-lg font-bold">ختم کریں</button>
            </div>
        </section>

        <!-- Records Management -->
        <section class="card p-6">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold">ریکارڈز</h2>
                <select id="view-type" class="bg-gray-100 p-2 rounded-lg outline-none">
                    <option value="khata">کھاتہ (بقایا)</option>
                    <option value="all">تمام ریکارڈ</option>
                </select>
            </div>

            <div id="records-list" class="space-y-4">
                <!-- Records will appear here -->
            </div>
        </section>
    </div>

    <!-- Payment Modal -->
    <div id="pay-modal" class="hidden fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-xl w-full max-w-sm">
            <h3 class="text-xl font-bold mb-4">رقم وصول کریں</h3>
            <p class="mb-4">کل بقایا: <span id="modal-balance" class="font-bold text-red-600">0</span> روپے</p>
            <input type="number" id="pay-input" class="input-style mb-4" placeholder="رقم درج کریں">
            <div class="flex gap-2">
                <button id="close-pay" class="flex-1 bg-gray-200 py-2 rounded-lg">بند کریں</button>
                <button id="confirm-pay" class="flex-1 bg-green-600 text-white py-2 rounded-lg">وصول</button>
            </div>
        </div>
    </div>

    <script>
        // PWA Implementation Fix
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').classList.remove('hidden');
        });

        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('install-banner').classList.add('hidden');
                }
                deferredPrompt = null;
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log("SW failed", err));
            });
        }

        // App Logic
        const form = document.getElementById('calc-form');
        const receiptBox = document.getElementById('receipt-box');
        const receiptContent = document.getElementById('receipt-content');
        const recordsList = document.getElementById('records-list');
        
        let tempRecord = null;
        let db = JSON.parse(localStorage.getItem('chakki_db')) || [];

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('cust-name').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const rate = parseFloat(document.getElementById('rate').value) || 0;
            const advance = parseFloat(document.getElementById('advance').value) || 0;
            const noSafai = document.getElementById('no-safai').checked;
            const noKatoti = document.getElementById('no-katoti').checked;
            const billFlour = document.getElementById('bill-flour').checked;

            const grindingRate = noSafai ? 3.00 : 4.25;
            const grindingCost = weight * grindingRate;
            const katotiWeight = weight * 0.05;
            const katotiValue = katotiWeight * rate;

            let totalBill = grindingCost + (noKatoti ? katotiValue : 0);
            let netFlour = weight - (noKatoti ? 0 : katotiWeight) - advance;

            if (billFlour && rate > 0) {
                const flourDed = totalBill / rate;
                netFlour -= flourDed;
                totalBill = 0; // Bill paid in flour
            }

            tempRecord = {
                id: Date.now(),
                name,
                weight,
                rate,
                totalBill,
                netFlour,
                katoti: noKatoti ? 0 : katotiWeight,
                balance: totalBill,
                date: new Date().toLocaleDateString('ur-PK'),
                history: []
            };

            receiptContent.innerHTML = `
                <div class="flex justify-between"><span>گاہک:</span> <strong>${name}</strong></div>
                <div class="flex justify-between"><span>کل وزن:</span> <span>${weight} کلو</span></div>
                <div class="flex justify-between"><span>کٹوتی:</span> <span>${tempRecord.katoti.toFixed(2)} کلو</span></div>
                <div class="flex justify-between text-blue-700 font-bold"><span>کل بل:</span> <span>${totalBill.toFixed(2)} روپے</span></div>
                <div class="flex justify-between text-green-700 font-bold border-t pt-2"><span>خالص آٹا:</span> <span>${netFlour.toFixed(2)} کلو</span></div>
            `;
            receiptBox.classList.remove('hidden');
        });

        document.getElementById('save-khata').onclick = () => {
            db.unshift(tempRecord);
            saveToStorage();
            receiptBox.classList.add('hidden');
            form.reset();
            renderRecords();
        };

        document.getElementById('clear-receipt').onclick = () => {
            receiptBox.classList.add('hidden');
            tempRecord = null;
        };

        function saveToStorage() {
            localStorage.setItem('chakki_db', JSON.stringify(db));
        }

        function renderRecords() {
            const filter = document.getElementById('view-type').value;
            recordsList.innerHTML = '';

            let filtered = db;
            if (filter === 'khata') filtered = db.filter(r => r.balance > 0);

            if (filtered.length === 0) {
                recordsList.innerHTML = '<p class="text-center text-gray-400 py-10">کوئی ریکارڈ نہیں ملا</p>';
                return;
            }

            filtered.forEach(record => {
                const card = document.createElement('div');
                card.className = 'card p-4 border-r-4 ' + (record.balance > 0 ? 'border-red-500' : 'border-green-500');
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-xl">${record.name}</h3>
                            <p class="text-sm text-gray-500">${record.date}</p>
                        </div>
                        <div class="text-left">
                            <p class="font-bold ${record.balance > 0 ? 'text-red-600' : 'text-green-600'}">بقایا: ${record.balance.toFixed(2)}</p>
                            <p class="text-xs">وزن: ${record.weight} کلو</p>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-4">
                        ${record.balance > 0 ? `<button onclick="openPayment(${record.id})" class="bg-green-100 text-green-700 px-3 py-1 rounded-md text-sm font-bold">رقم وصول کریں</button>` : ''}
                        <button onclick="deleteRecord(${record.id})" class="bg-red-100 text-red-700 px-3 py-1 rounded-md text-sm font-bold">ڈیلیٹ</button>
                    </div>
                `;
                recordsList.appendChild(card);
            });
        }

        let activePayId = null;
        window.openPayment = (id) => {
            activePayId = id;
            const rec = db.find(r => r.id === id);
            document.getElementById('modal-balance').innerText = rec.balance.toFixed(2);
            document.getElementById('pay-modal').classList.remove('hidden');
        };

        document.getElementById('close-pay').onclick = () => {
            document.getElementById('pay-modal').classList.add('hidden');
            activePayId = null;
        };

        document.getElementById('confirm-pay').onclick = () => {
            const amount = parseFloat(document.getElementById('pay-input').value) || 0;
            if (amount <= 0) return;

            const idx = db.findIndex(r => r.id === activePayId);
            if (idx !== -1) {
                db[idx].balance -= amount;
                if (db[idx].balance < 0) db[idx].balance = 0;
                db[idx].history.push({ date: new Date().toLocaleDateString('ur-PK'), amount });
                saveToStorage();
                renderRecords();
            }
            document.getElementById('pay-input').value = '';
            document.getElementById('pay-modal').classList.add('hidden');
        };

        window.deleteRecord = (id) => {
            if (confirm('کیا آپ واقعی یہ ریکارڈ ختم کرنا چاہتے ہیں؟')) {
                db = db.filter(r => r.id !== id);
                saveToStorage();
                renderRecords();
            }
        };

        document.getElementById('view-type').onchange = renderRecords;

        // Init
        renderRecords();
    </script>
</body>
</html>
